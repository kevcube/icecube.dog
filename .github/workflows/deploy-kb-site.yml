name: Deploy kb site

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-kb-site.yml"
      - "marriage_site/**"
      - "package.json"
      - "bun.lock"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-kb-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run --cwd marriage_site build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::633038869443:role/github

      - name: Upload site to S3
        run: aws s3 sync marriage_site/dist s3://kb-icecube-dog-origin-633038869443 --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E31PJ1G6FH8ZRE --paths "/*"
