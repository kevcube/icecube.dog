<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kb.icecube.dog</title>
    <meta name="description" content="Mongolian marriage symbols" />
    <style>
      :root {
        color-scheme: light;
        background: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #ffffff;
        overscroll-behavior: none;
      }

      .shell {
        position: relative;
        min-height: 300vh;
        width: 100vw;
      }

      .stage {
        position: fixed;
        inset: 0;
        margin: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
      }

      .render-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #ffffff;
        pointer-events: auto;
      }

      .content {
        position: relative;
        z-index: 1;
        min-height: 300vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 16vh 7vw 18vh;
        pointer-events: none;
      }

      .block {
        min-height: 62vh;
        display: flex;
        align-items: flex-start;
      }

      .block p {
        margin: 0;
        font: 500 1rem/1.4 ui-sans-serif, system-ui, sans-serif;
        color: rgba(0, 0, 0, 0.28);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <figure class="stage">
        <canvas
          id="marriage-symbol-canvas"
          class="render-canvas"
          aria-label="3D render of overlapping Mongolian marriage symbols"
        ></canvas>
      </figure>
      <div class="content">
        <section class="block"><p>Scroll test</p></section>
        <section class="block"><p>Keep scrolling</p></section>
        <section class="block"><p>Bottom of page</p></section>
      </div>
    </main>
    <script type="module" src="./scene.ts"></script>
  </body>
</html>
