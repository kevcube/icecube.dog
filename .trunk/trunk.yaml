version: 0.1
cli:
  version: 1.24.0
plugins:
  sources:
    - id: trunk
      ref: v1.7.1
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - osv-scanner@2.0.3
    - trivy@0.64.1
    - yamllint@1.37.1
    - eslint@8.57.0
    - actionlint@1.7.7
    - shellcheck@0.10.0
    - markdownlint@0.45.0
    - shfmt@3.6.0
    - gitleaks@8.28.0
    - git-diff-check
    - prettier@3.6.2
  disabled:
    - trufflehog # False positives
    - checkov # slow
  ignore:
    - linters: [ALL]
      paths:
        - .yarn/cache/**
        - .yarn/sdks/**
runtimes:
  enabled:
    - python@3.10.8
    - go@1.21.0
    - node@22.16.0
actions:
  enabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
